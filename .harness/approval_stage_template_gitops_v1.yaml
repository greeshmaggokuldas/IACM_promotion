template:
  name: approval_stage_template_gitops
  type: Stage
  projectIdentifier: Greeshma_Playground
  orgIdentifier: playground
  spec:
    type: Approval
    spec:
      execution:
        steps:
          - step:
              name: Approval
              identifier: Approval
              type: HarnessApproval
              timeout: 1d
              spec:
                approvalMessage: |2
                   Pipeline triggered by: <+pipeline.triggeredBy.name> (<+pipeline.triggeredBy.email>)

                  Warning messages : <+pipeline.stages.App_list_and_Diff.spec.execution.steps.Policy_1.output.policySetDetails.GitOps.policyDetails.new_policy_05_15_18_02.denyMessages>
                includePipelineExecutionHistory: true
                approvers:
                  minimumCount: 1
                  disallowPipelineExecutor: false
                  userGroups:
                    - _project_all_users
                isAutoRejectEnabled: false
                approverInputs: []
  identifier: approval_stage_template_gitops
  versionLabel: v1
